<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.6" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0c4a24"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#15803d" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#15803d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grass" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#15803d"/>
      <rect x="0" width="20" height="40" fill="#0c4a24" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#spot)"/>
  <rect y="600" width="1600" height="300" fill="url(#grass)"/>
  <g opacity="0.4" fill="#ffffff">
    <circle cx="200" cy="160" r="2"/>
    <circle cx="400" cy="100" r="1.5"/>
    <circle cx="700" cy="180" r="1"/>
    <circle cx="950" cy="80" r="2"/>
    <circle cx="1200" cy="140" r="1.5"/>
    <circle cx="1450" cy="200" r="1"/>
  </g>
  <g fill="#ffffff" opacity="0.85" font-family="Impact, Arial, sans-serif">
    <text x="50%" y="380" text-anchor="middle" font-size="80" letter-spacing="6">PLACEHOLDER HERO</text>
    <text x="50%" y="440" text-anchor="middle" font-size="28" opacity="0.7" letter-spacing="3">Wstaw zdjecie ze stadionu / druzyny w public/hero/</text>
  </g>
</svg>
